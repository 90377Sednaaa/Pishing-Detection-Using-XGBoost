<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phishing URL Detector</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #020408;
        --bg2: #060d14;
        --panel: #0a1520;
        --border: #0e2a3d;
        --accent: #00d4ff;
        --accent2: #0066ff;
        --safe: #00ff88;
        --danger: #ff2244;
        --warn: #ffaa00;
        --text: #c8e0f0;
        --muted: #3a6070;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Rajdhani", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        content: "";
        position: fixed;
        top: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(0, 102, 255, 0.07) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 820px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      header {
        text-align: center;
        margin-bottom: 48px;
      }
      .logo-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-bottom: 8px;
      }
      .logo-icon {
        width: 42px;
        height: 42px;
        position: relative;
      }
      .logo-icon svg {
        width: 100%;
        height: 100%;
      }
      h1 {
        font-family: "Orbitron", monospace;
        font-size: 2.2rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        background: linear-gradient(
          135deg,
          #00d4ff 0%,
          #0066ff 50%,
          #00d4ff 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s linear infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      .tagline {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-top: 6px;
      }
      .status-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        margin-top: 16px;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--safe);
        box-shadow: 0 0 8px var(--safe);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .status-text {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        letter-spacing: 0.15em;
      }
      .input-section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 28px;
        position: relative;
        overflow: hidden;
        margin-bottom: 24px;
      }
      .input-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        opacity: 0.6;
      }
      .input-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.7rem;
        color: var(--accent);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .input-label::before {
        content: "//";
        color: var(--muted);
      }
      .url-input-wrap {
        display: flex;
        gap: 0;
        position: relative;
      }
      .url-prefix {
        background: rgba(0, 212, 255, 0.08);
        border: 1px solid var(--border);
        border-right: none;
        border-radius: 3px 0 0 3px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        font-family: "Share Tech Mono", monospace;
        font-size: 0.8rem;
        color: var(--muted);
        white-space: nowrap;
        flex-shrink: 0;
      }
      #urlInput {
        flex: 1;
        background: rgba(6, 18, 30, 0.8);
        border: 1px solid var(--border);
        border-right: none;
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.9rem;
        padding: 14px 16px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        min-width: 0;
      }
      #urlInput::placeholder {
        color: var(--muted);
      }
      #urlInput:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(0, 212, 255, 0.15) inset;
      }
      .scan-btn {
        background: linear-gradient(135deg, var(--accent2), var(--accent));
        border: none;
        color: #000;
        font-family: "Orbitron", monospace;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        padding: 14px 24px;
        border-radius: 0 3px 3px 0;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s;
        white-space: nowrap;
        flex-shrink: 0;
        text-transform: uppercase;
      }
      .scan-btn:hover {
        opacity: 0.85;
      }
      .scan-btn:active {
        transform: scale(0.98);
      }
      .scan-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .scan-overlay {
        display: none;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 40px 28px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .scan-overlay.active {
        display: block;
      }
      .scan-lines {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }
      .scan-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        animation: scanLine 2s linear infinite;
        opacity: 0.4;
      }
      .scan-line:nth-child(2) {
        animation-delay: -1s;
      }
      @keyframes scanLine {
        0% {
          top: -2px;
        }
        100% {
          top: 100%;
        }
      }
      .scan-radar {
        width: 100px;
        height: 100px;
        margin: 0 auto 24px;
        position: relative;
      }
      .scan-radar svg {
        width: 100%;
        height: 100%;
        animation: radarSpin 1.5s linear infinite;
      }
      @keyframes radarSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .scan-title {
        font-family: "Orbitron", monospace;
        font-size: 1rem;
        color: var(--accent);
        letter-spacing: 0.2em;
        margin-bottom: 10px;
      }
      .scan-steps {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        line-height: 2;
      }
      .scan-step {
        opacity: 0.3;
        transition: opacity 0.3s;
      }
      .scan-step.active {
        opacity: 1;
        color: var(--accent);
      }
      .scan-step.done {
        opacity: 0.6;
        color: var(--safe);
      }
      .scan-step.done::before {
        content: "✓ ";
      }
      .scan-step.active::before {
        content: "► ";
      }
      .scan-progress-bar {
        height: 2px;
        background: var(--border);
        border-radius: 1px;
        margin-top: 20px;
        overflow: hidden;
      }
      .scan-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        border-radius: 1px;
        width: 0%;
        transition: width 0.3s ease;
        box-shadow: 0 0 8px var(--accent);
      }
      .result-section {
        display: none;
      }
      .result-section.active {
        display: block;
      }
      .verdict-card {
        border-radius: 4px;
        padding: 32px 28px;
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
        border: 1px solid;
        transition: all 0.3s;
      }
      .verdict-card.safe {
        background: linear-gradient(
          135deg,
          rgba(0, 255, 136, 0.05) 0%,
          rgba(6, 18, 30, 0.9) 100%
        );
        border-color: rgba(0, 255, 136, 0.3);
      }
      .verdict-card.phishing {
        background: linear-gradient(
          135deg,
          rgba(255, 34, 68, 0.07) 0%,
          rgba(6, 18, 30, 0.9) 100%
        );
        border-color: rgba(255, 34, 68, 0.35);
      }
      .verdict-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
      }
      .verdict-card.safe::before {
        background: linear-gradient(
          90deg,
          transparent,
          var(--safe),
          transparent
        );
      }
      .verdict-card.phishing::before {
        background: linear-gradient(
          90deg,
          transparent,
          var(--danger),
          transparent
        );
      }
      .verdict-header {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .verdict-icon {
        width: 60px;
        height: 60px;
        flex-shrink: 0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        position: relative;
      }
      .verdict-card.safe .verdict-icon {
        background: rgba(0, 255, 136, 0.1);
        border: 2px solid rgba(0, 255, 136, 0.4);
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        animation: safeGlow 2s ease-in-out infinite;
      }
      .verdict-card.phishing .verdict-icon {
        background: rgba(255, 34, 68, 0.1);
        border: 2px solid rgba(255, 34, 68, 0.4);
        box-shadow: 0 0 20px rgba(255, 34, 68, 0.2);
        animation: dangerPulse 1s ease-in-out infinite;
      }
      @keyframes safeGlow {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        50% {
          box-shadow: 0 0 35px rgba(0, 255, 136, 0.4);
        }
      }
      @keyframes dangerPulse {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(255, 34, 68, 0.2);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 34, 68, 0.5);
        }
      }
      .verdict-label {
        font-family: "Orbitron", monospace;
        font-size: 1.6rem;
        font-weight: 900;
        letter-spacing: 0.1em;
      }
      .verdict-card.safe .verdict-label {
        color: var(--safe);
      }
      .verdict-card.phishing .verdict-label {
        color: var(--danger);
      }
      .verdict-sublabel {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.15em;
        margin-top: 4px;
      }
      .verdict-card.phishing .verdict-sublabel {
        color: rgba(255, 34, 68, 0.6);
      }
      .url-display {
        margin-top: 20px;
        padding: 12px 16px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 3px;
        border: 1px solid var(--border);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.8rem;
        color: var(--muted);
        word-break: break-all;
      }
      .url-display span {
        color: var(--text);
      }
      .features-header {
        font-family: "Share Tech Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .features-header::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 8px;
        margin-bottom: 20px;
      }
      .feature-item {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 0.82rem;
        transition: border-color 0.2s;
      }
      .feature-name {
        color: var(--muted);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.72rem;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .feature-val {
        font-family: "Orbitron", monospace;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .feature-val.good {
        color: var(--safe);
        background: rgba(0, 255, 136, 0.1);
        border: 1px solid rgba(0, 255, 136, 0.2);
      }
      .feature-val.bad {
        color: var(--danger);
        background: rgba(255, 34, 68, 0.1);
        border: 1px solid rgba(255, 34, 68, 0.2);
      }
      .feature-val.neutral {
        color: var(--warn);
        background: rgba(255, 170, 0, 0.1);
        border: 1px solid rgba(255, 170, 0, 0.2);
      }
      .reset-btn {
        width: 100%;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: "Share Tech Mono", monospace;
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        padding: 12px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        margin-top: 8px;
      }
      .reset-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(0, 212, 255, 0.04);
      }
      footer {
        text-align: center;
        margin-top: 48px;
        font-family: "Share Tech Mono", monospace;
        font-size: 0.65rem;
        color: var(--muted);
        letter-spacing: 0.1em;
      }
      .fade-in {
        animation: fadeInUp 0.4s ease forwards;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .danger-flash {
        animation: dangerFlash 0.6s ease;
      }
      @keyframes dangerFlash {
        0% {
          background: var(--bg);
        }
        15% {
          background: rgba(255, 34, 68, 0.08);
        }
        40% {
          background: rgba(255, 34, 68, 0.04);
        }
        100% {
          background: var(--bg);
        }
      }
      @media (max-width: 600px) {
        h1 {
          font-size: 1.5rem;
        }
        .features-grid {
          grid-template-columns: 1fr 1fr;
        }
        .url-prefix {
          display: none;
        }
        #urlInput {
          border-radius: 3px 0 0 3px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo-row">
          <h1>XGBoost Phishing Detector</h1>
        </div>
        <p class="tagline">// ML-Powered URL Threat Intelligence</p>
        <div class="status-bar">
          <div class="status-dot" id="systemDot"></div>
          <span class="status-text" id="systemStatus">SYSTEM ONLINE</span>
        </div>
      </header>

      <div class="input-section" id="inputSection">
        <div class="input-label">Target URL for Analysis</div>
        <div class="url-input-wrap">
          <div class="url-prefix">URL ▸</div>
          <input
            type="text"
            id="urlInput"
            placeholder="paste URL to analyze..."
            autocomplete="off"
            spellcheck="false"
            onkeydown="if (event.key === 'Enter') runAnalysis();"
          />
          <button class="scan-btn" id="scanBtn" onclick="runAnalysis()">
            SCAN
          </button>
        </div>
      </div>

      <div class="scan-overlay" id="scanOverlay">
        <div class="scan-lines">
          <div class="scan-line"></div>
          <div class="scan-line"></div>
        </div>
        <div class="scan-radar">
          <svg
            viewBox="0 0 100 100"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="50"
              cy="50"
              r="46"
              stroke="rgba(0,212,255,0.15)"
              stroke-width="1"
            />
            <circle
              cx="50"
              cy="50"
              r="30"
              stroke="rgba(0,212,255,0.2)"
              stroke-width="1"
            />
            <circle
              cx="50"
              cy="50"
              r="14"
              stroke="rgba(0,212,255,0.3)"
              stroke-width="1"
            />
            <path
              d="M50 50 L50 4"
              stroke="url(#sweep)"
              stroke-width="2"
              stroke-linecap="round"
            />
            <path
              d="M50 50 L82 20"
              stroke="rgba(0,212,255,0.1)"
              stroke-width="1"
            />
            <circle cx="50" cy="50" r="3" fill="#00d4ff" />
            <defs>
              <linearGradient id="sweep" x1="50" y1="4" x2="50" y2="50">
                <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.9" />
                <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.1" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="scan-title">ANALYZING THREAT PROFILE</div>
        <div class="scan-steps" id="scanSteps">
          <div class="scan-step" id="step1">
            Extracting lexical & address features
          </div>
          <div class="scan-step" id="step2">Fetching HTML/JS signals</div>
          <div class="scan-step" id="step3">Querying WHOIS & domain data</div>
          <div class="scan-step" id="step4">Running XGBoost classifier</div>
        </div>
        <div class="scan-progress-bar">
          <div class="scan-progress-fill" id="scanProgress"></div>
        </div>
      </div>

      <div class="result-section" id="resultSection">
        <div class="verdict-card fade-in" id="verdictCard">
          <div class="verdict-header">
            <div class="verdict-icon" id="verdictIcon"></div>
            <div>
              <div class="verdict-label" id="verdictLabel"></div>
              <div class="verdict-sublabel" id="verdictSublabel"></div>
            </div>
          </div>
          <div class="url-display">SCANNED: <span id="scannedUrl"></span></div>
        </div>

        <div class="features-header">Feature Analysis</div>
        <div class="features-grid" id="featuresGrid"></div>

        <button class="reset-btn" onclick="resetUI()">
          [ ANALYZE ANOTHER URL ]
        </button>
      </div>
    </div>

    <script>
      const FEATURE_NAMES = [
        "having_IP_Address",
        "URL_Length",
        "Shortining_Service",
        "having_At_Symbol",
        "double_slash_redirecting",
        "Prefix_Suffix",
        "having_Sub_Domain",
        "SSLfinal_State",
        "Domain_registeration_length",
        "Favicon",
        "port",
        "HTTPS_token",
        "Request_URL",
        "URL_of_Anchor",
        "Links_in_tags",
        "SFH",
        "Submitting_to_email",
        "Abnormal_URL",
        "Redirect",
        "on_mouseover",
        "RightClick",
        "popUpWidnow",
        "Iframe",
        "age_of_domain",
        "DNSRecord",
        "web_traffic",
        "Page_Rank",
        "Google_Index",
        "Links_pointing_to_page",
        "Statistical_report",
      ];

      const FEATURE_LABELS = {
        having_IP_Address: "IP Address in URL",
        URL_Length: "URL Length",
        Shortining_Service: "URL Shortener",
        having_At_Symbol: "@ Symbol",
        double_slash_redirecting: "Double Slash Redirect",
        Prefix_Suffix: "Prefix/Suffix (-)",
        having_Sub_Domain: "Subdomains",
        SSLfinal_State: "SSL Certificate",
        Domain_registeration_length: "Domain Age",
        Favicon: "Favicon Source",
        port: "Unusual Port",
        HTTPS_token: "HTTPS Token",
        Request_URL: "External Resources",
        URL_of_Anchor: "Anchor URLs",
        Links_in_tags: "Tag Links",
        SFH: "Form Handler",
        Submitting_to_email: "Form to Email",
        Abnormal_URL: "Abnormal URL",
        Redirect: "Redirect Count",
        on_mouseover: "Mouseover Change",
        RightClick: "Right-Click Blocked",
        popUpWidnow: "Pop-up Window",
        Iframe: "iFrame Usage",
        age_of_domain: "Domain Age",
        DNSRecord: "DNS Record",
        web_traffic: "Web Traffic",
        Page_Rank: "Page Rank",
        Google_Index: "Google Index",
        Links_pointing_to_page: "Inbound Links",
        Statistical_report: "Blacklist Report",
      };

      // FIXED: Strictly ties values to the dataset rules
      function classifyFeatureValue(value) {
        if (value === 1) return "good"; // Safe (Green)
        if (value === 0) return "neutral"; // Suspicious (Yellow)
        if (value === -1) return "bad"; // Phishing (Red)
        return "neutral";
      }

      function formatFeatureValue(value) {
        if (value === 1) return "SAFE";
        if (value === 0) return "SUSPICIOUS";
        if (value === -1) return "MALICIOUS";
        return String(value);
      }

      async function runAnalysis() {
        const input = document.getElementById("urlInput");
        let url = input.value.trim();
        if (!url) {
          input.focus();
          return;
        }
        if (!url.startsWith("http")) url = "http://" + url;

        document.getElementById("inputSection").style.opacity = "0.4";
        document.getElementById("inputSection").style.pointerEvents = "none";
        document.getElementById("scanBtn").disabled = true;
        document.getElementById("scanOverlay").classList.add("active");
        document.getElementById("resultSection").classList.remove("active");

        const steps = ["step1", "step2", "step3", "step4"];
        const durations = [900, 1100, 1200, 600];
        const progress = document.getElementById("scanProgress");
        let total = 0;
        const totalTime = durations.reduce((a, b) => a + b, 0);

        for (let i = 0; i < steps.length; i++) {
          document.getElementById(steps[i]).classList.add("active");
          await sleep(durations[i]);
          total += durations[i];
          progress.style.width = (total / totalTime) * 100 + "%";
          document.getElementById(steps[i]).classList.remove("active");
          document.getElementById(steps[i]).classList.add("done");
        }

        let result;
        try {
          // Send request as JSON to our updated Flask API
          const response = await fetch("/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url }),
          });

          if (!response.ok) throw new Error(`Server error: ${response.status}`);
          const data = await response.json();

          result = {
            isPhishing: data.isPhishing,
            features: data.features,
          };
        } catch (err) {
          document.getElementById("scanOverlay").classList.remove("active");
          document.getElementById("inputSection").style.opacity = "1";
          document.getElementById("inputSection").style.pointerEvents = "";
          document.getElementById("scanBtn").disabled = false;
          alert(
            `Connection error: ${err.message}\n\nMake sure your Flask server is running!`,
          );
          return;
        }

        document.getElementById("scanOverlay").classList.remove("active");
        showResult(url, result);
      }

      function showResult(url, result) {
        const section = document.getElementById("resultSection");
        const card = document.getElementById("verdictCard");
        const icon = document.getElementById("verdictIcon");
        const label = document.getElementById("verdictLabel");
        const sublabel = document.getElementById("verdictSublabel");
        const scanned = document.getElementById("scannedUrl");
        const grid = document.getElementById("featuresGrid");

        scanned.textContent = url;

        if (result.isPhishing) {
          card.className = "verdict-card phishing fade-in";
          icon.textContent = "⚠";
          label.textContent = "PHISHING DETECTED";
          sublabel.textContent =
            "High probability malicious URL · Do not proceed";
          document.body.classList.add("danger-flash");
          setTimeout(() => document.body.classList.remove("danger-flash"), 700);
        } else {
          card.className = "verdict-card safe fade-in";
          icon.textContent = "✓";
          label.textContent = "LEGITIMATE";
          sublabel.textContent =
            "Low threat probability · Appears safe to visit";
        }

        grid.innerHTML = "";
        FEATURE_NAMES.forEach((name, i) => {
          const val = result.features[i];
          const cls = classifyFeatureValue(val);
          const item = document.createElement("div");
          item.className = "feature-item";
          item.innerHTML = `
            <span class="feature-name">${FEATURE_LABELS[name] || name}</span>
            <span class="feature-val ${cls}">${formatFeatureValue(val)}</span>
          `;
          grid.appendChild(item);
        });

        document.getElementById("systemStatus").textContent = result.isPhishing
          ? "THREAT DETECTED · Proceed with caution"
          : "SCAN COMPLETE · No threats found";
        document.getElementById("systemDot").style.background =
          result.isPhishing ? "var(--danger)" : "var(--safe)";
        document.getElementById("systemDot").style.boxShadow = result.isPhishing
          ? "0 0 8px var(--danger)"
          : "0 0 8px var(--safe)";

        section.classList.add("active");
      }

      function resetUI() {
        document.getElementById("resultSection").classList.remove("active");
        document.getElementById("inputSection").style.opacity = "1";
        document.getElementById("inputSection").style.pointerEvents = "";
        document.getElementById("scanBtn").disabled = false;
        document.getElementById("urlInput").value = "";
        document.getElementById("urlInput").focus();

        ["step1", "step2", "step3", "step4"].forEach((s) => {
          const el = document.getElementById(s);
          el.classList.remove("active", "done");
        });
        document.getElementById("scanProgress").style.width = "0%";
        document.getElementById("systemStatus").textContent = "SYSTEM ONLINE";
        document.getElementById("systemDot").style.background = "var(--safe)";
        document.getElementById("systemDot").style.boxShadow =
          "0 0 8px var(--safe)";
      }

      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }
    </script>
  </body>
</html>
